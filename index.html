<script>
    // --- LIVE DATABASE CONNECTION ---
    const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co"; 
    const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
    
    // Initialize Supabase
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    async function validatePortalEntry() {
        console.log("Button clicked. Attempting to login...");
        
        const email = document.getElementById('student-email').value;
        const key = document.getElementById('dragon-key').value;

        if (!email || !key) {
            alert("Please enter both email and key.");
            return;
        }

        try {
            // 1. Fetch the Key from Supabase
            const { data, error } = await supabase
                .from('exam_keys')
                .select('*, exam_configs(*)')
                .eq('key_code', key)
                .single();

            if (error) {
                console.error("Supabase Error:", error);
                alert("Database Error: " + error.message);
                return;
            }

            if (!data) {
                alert("Dragon Key not found in database.");
                return;
            }

            // 2. Success! Transition the UI
            console.log("Login successful!", data);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            
            // 3. Update Sidebar with Student Data
            document.getElementById('display-name').innerText = email.split('@')[0].toUpperCase();
            document.getElementById('hero-name').innerText = email.split('@')[0];
            document.getElementById('display-key').innerText = key;
            document.getElementById('avatar-initials').innerText = email.charAt(0).toUpperCase();

        } catch (err) {
            console.error("Critical System Error:", err);
            alert("System Error: Check if your Project URL is correct.");
        }
    }

    function navigate(page, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        if (btn) btn.classList.add('active');
    }
</script>
