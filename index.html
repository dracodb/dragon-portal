<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flaming Dragon — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --red: #880b18; --gold: #ffcf00; --dark: #0f0f0f; --surface: #1e1e1e;
            --border: rgba(255,255,255,0.08); --text: #f0ede8; --text-dim: #9a9590;
            --font-head: 'Oswald', sans-serif; --font-body: 'Montserrat', sans-serif;
        }
        body { background: var(--dark); color: var(--text); font-family: var(--font-body); margin: 0; overflow: hidden; height: 100vh; }
        
        /* Version Tag - FORCED TO TOP */
        .v-tag { 
            position: fixed; bottom: 10px; right: 10px; 
            font-family: monospace; font-size: 10px; color: var(--gold); 
            z-index: 9999; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px;
        }

        /* Login UI */
        .login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 340px; text-align: center; }
        .logo-flame { width: 45px; height: 45px; background: var(--red); border-radius: 10px; margin: 0 auto 15px; position: relative; }
        .logo-flame::after { content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid var(--gold); }
        
        .input-group { position: relative; margin-bottom: 15px; width: 100%; }
        .input-dark { background: #111; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; font-size: 14px; }
        .input-dark:focus { border-color: var(--gold); }
        
        .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gold); font-size: 10px; font-weight: bold; z-index: 10; padding: 5px; }

        /* Main Layout */
        .app-container { display: none; min-height: 100vh; flex-direction: row; }
        .sidebar { width: 260px; background: #111; border-right: 1px solid var(--border); padding: 30px 20px; flex-shrink: 0; }
        .nav-item { padding: 14px; cursor: pointer; color: var(--text-dim); border-radius: 10px; margin-bottom: 8px; font-weight: 600; }
        .nav-item.active { background: rgba(136,11,24,0.25); color: var(--gold); border-left: 4px solid var(--gold); }
        
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 30px; }
        .btn { background: var(--red); color: white; border: none; padding: 14px; border-radius: 10px; font-family: var(--font-head); cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="v-tag">VER_1.0.9</div>

    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="logo-flame"></div>
            <h2 style="font-family: var(--font-head); margin: 0;">FLAMING DRAGON</h2>
            <p style="font-size: 10px; color: var(--gold); letter-spacing: 3px; margin-bottom: 30px;">STUDENT LOGIN</p>
            
            <div class="input-group">
                <input type="email" id="email" class="input-dark" placeholder="Email Address">
            </div>
            
            <div class="input-group">
                <input type="password" id="pass" class="input-dark" placeholder="Password">
                <span class="toggle-pass" id="toggleText" onclick="togglePassword()">SHOW</span>
            </div>
            
            <button id="login-btn" class="btn" onclick="doLogin()">ACCESS PORTAL</button>
        </div>
    </div>

    <div id="app" class="app-container">
        <aside class="sidebar">
            <h3 style="font-family: var(--font-head);">DRAGON PORTAL</h3>
            <p id="user-display" style="color: var(--gold); font-size: 11px;"></p>
            <div class="nav-item active" onclick="switchPage('dashboard', this)">Dashboard</div>
            <div class="nav-item" onclick="switchPage('exams', this)">Exams</div>
            <div class="nav-item" onclick="switchPage('results', this)">Results</div>
            <div style="margin-top: 40px;"><button class="btn" onclick="location.reload()">LOGOUT</button></div>
        </aside>
        <main class="main-content">
            <div id="page-dashboard" class="page active">
                <div class="card"><h1>Dashboard v1.0.9</h1><p>System online.</p></div>
            </div>
            <div id="page-exams" class="page"><div class="card"><h1>Exam Portal</h1></div></div>
            <div id="page-results" class="page"><div class="card"><h1>Results Table</h1></div></div>
        </main>
    </div>

    <script>
        const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co";
        const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        // Fixed Toggle Function
        function togglePassword() {
            const passField = document.getElementById('pass');
            const toggleText = document.getElementById('toggleText');
            if (passField.type === "password") {
                passField.type = "text";
                toggleText.innerText = "HIDE";
            } else {
                passField.type = "password";
                toggleText.innerText = "SHOW";
            }
        }

        async function doLogin() {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value.trim();
            const btn = document.getElementById('login-btn');

            if(!e || !p) return alert("Missing fields");

            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', e)
                    .eq('password', p)
                    .limit(1);

                if (error || !data || data.length === 0) {
                    alert("Login Failed.");
                    btn.innerText = "ACCESS PORTAL";
                    btn.disabled = false;
                } else {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    document.getElementById('user-display').innerText = data[0].email;
                }
            } catch (err) {
                alert("Error connecting to Supabase.");
                btn.disabled = false;
            }
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
