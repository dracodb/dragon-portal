<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flaming Dragon — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #880b18; --gold: #ffcf00; --dark: #0f0f0f; --surface: #1e1e1e;
            --border: rgba(255,255,255,0.08); --text: #f0ede8; --text-dim: #9a9590;
            --font-head: 'Oswald', sans-serif; --font-body: 'Montserrat', sans-serif;
        }
        body { background: var(--dark); color: var(--text); font-family: var(--font-body); margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .v-tag { position: fixed; bottom: 10px; right: 10px; font-family: monospace; font-size: 10px; color: var(--gold); z-index: 9999; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }

        .login-card { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 340px; text-align: center; z-index: 100; }
        .logo-flame { width: 45px; height: 45px; background: var(--red); border-radius: 10px; margin: 0 auto 15px; position: relative; }
        .logo-flame::after { content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid var(--gold); }
        
        .input-group { position: relative; margin-bottom: 15px; width: 100%; }
        .input-dark { background: #111; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; font-size: 14px; }
        
        .toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #222; color: var(--gold); font-size: 9px; font-weight: bold; padding: 5px 8px; border-radius: 4px; cursor: pointer; user-select: none; border: 1px solid var(--border); }

        .btn { background: var(--red); color: white; border: none; padding: 14px; border-radius: 10px; font-family: var(--font-head); cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        
        #app-portal { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 3000; padding: 50px; text-align: center; }
    </style>
</head>
<body>

    <div class="v-tag">DRAGON_VER_1.1.1</div>

    <div id="login-ui" class="login-card">
        <div class="logo-flame"></div>
        <h2 style="font-family: var(--font-head); margin: 0;">FLAMING DRAGON</h2>
        <p style="font-size: 10px; color: var(--gold); letter-spacing: 3px; margin-bottom: 30px;">STUDENT LOGIN</p>
        
        <div class="input-group">
            <input type="email" id="email" class="input-dark" placeholder="Email Address">
        </div>
        
        <div class="input-group">
            <input type="password" id="pass" class="input-dark" placeholder="Password">
            <div class="toggle-btn" id="eye" onclick="togglePass()">SHOW</div>
        </div>
        
        <button id="login-btn" class="btn" onclick="portalLogin()">ACCESS PORTAL</button>
    </div>

    <div id="app-portal">
        <h1 style="font-family: var(--font-head);">DRAGON VAULT OPEN</h1>
        <p id="user-info"></p>
        <button onclick="location.reload()" class="btn" style="width:200px; background:none; border:1px solid var(--border);">LOGOUT</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co";
        const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
        let supabase;

        // Initialize only when library is ready
        window.addEventListener('DOMContentLoaded', () => {
            try {
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                console.log("Database initialized.");
            } catch(e) {
                console.error("Database connection failed.");
            }
        });

        function togglePass() {
            const p = document.getElementById('pass');
            const eye = document.getElementById('eye');
            if(p.type === "password") {
                p.type = "text";
                eye.innerText = "HIDE";
            } else {
                p.type = "password";
                eye.innerText = "SHOW";
            }
        }

        async function portalLogin() {
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pass').value.trim();

            if(!email || !password) return alert("Please enter credentials.");

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('email', email)
                .eq('password', password)
                .limit(1);

            if(error || !data || data.length === 0) {
                alert("Login Failed. Check your email/password.");
                btn.innerText = "ACCESS PORTAL";
                btn.disabled = false;
            } else {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('app-portal').style.display = 'block';
                document.getElementById('user-info').innerText = "Logged in: " + data[0].email;
            }
        }
    </script>
</body>
</html>
