<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flaming Dragon — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --red: #880b18; --gold: #ffcf00; --dark: #0f0f0f; --surface: #1e1e1e;
            --border: rgba(255,255,255,0.08); --text: #f0ede8; --font-head: 'Oswald', sans-serif;
        }
        body { background: var(--dark); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .v-tag { position: fixed; bottom: 10px; right: 10px; font-family: monospace; font-size: 10px; color: var(--gold); z-index: 9999; background: #000; padding: 4px; border: 1px solid var(--border); }
        .login-card { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 340px; text-align: center; position: relative; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-dark { background: #111; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; }
        .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 10px; cursor: pointer; font-weight: bold; padding: 5px; background: #111; border-radius: 4px; }
        .btn { background: var(--red); color: white; padding: 14px; border-radius: 10px; border: none; font-family: var(--font-head); font-weight: 600; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        #app-portal { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 8000; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="v-tag">DRAGON_VER_1.2.3</div>

    <div id="login-ui" class="login-card">
        <h2 style="font-family: var(--font-head); margin-bottom: 20px;">FLAMING DRAGON</h2>
        <div class="input-group">
            <input type="email" id="email" class="input-dark" placeholder="Email Address">
        </div>
        <div class="input-group">
            <input type="password" id="pass" class="input-dark" placeholder="Password">
            <div class="toggle-btn" onclick="localToggle()">SHOW</div>
        </div>
        <button class="btn" id="login-btn" onclick="localLogin()">Access Portal</button>
    </div>

    <div id="app-portal">
        <h1 style="font-family: var(--font-head);">VAULT OPEN</h1>
        <p id="user-name" style="color:var(--gold)"></p>
        <button onclick="location.reload()" class="btn" style="width:200px; background:none; border:1px solid var(--border); margin-top:20px;">LOGOUT</button>
    </div>

    <script>
        // 1. Password Toggle (Pure JS, No Supabase dependency)
        function localToggle() {
            const p = document.getElementById('pass');
            const btn = event.target;
            if (p.type === "password") {
                p.type = "text";
                btn.innerText = "HIDE";
            } else {
                p.type = "password";
                btn.innerText = "SHOW";
            }
        }

        // 2. Login (Supabase is called ONLY inside here)
        async function localLogin() {
            console.log("Login attempt started...");
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value.trim();

            if (!email || !pass) {
                alert("Please fill all fields.");
                return;
            }

            btn.innerText = "CONNECTING...";
            btn.disabled = true;

            try {
                // Initialize Supabase only when needed
                const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co";
                const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
                const supabase = window.supabase.createClient(SB_URL, SB_KEY);

                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', pass)
                    .limit(1);

                if (error || !data || data.length === 0) {
                    alert("Login failed. Check your credentials.");
                    btn.innerText = "Access Portal";
                    btn.disabled = false;
                } else {
                    document.getElementById('login-ui').style.display = 'none';
                    document.getElementById('app-portal').style.display = 'block';
                    document.getElementById('user-name').innerText = "Student: " + data[0].email;
                }
            } catch (err) {
                console.error(err);
                alert("Critical System Error. Check browser console.");
                btn.innerText = "Access Portal";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
