<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flaming Dragon — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --red: #880b18; --red-dark: #5c0710; --red-light: #a81020;
            --gold: #ffcf00; --gold-dim: #c9a200; --dark: #0f0f0f;
            --dark2: #181818; --dark3: #222222; --dark4: #2a2a2a;
            --surface: #1e1e1e; --border: rgba(255,255,255,0.08);
            --text: #f0ede8; --text-dim: #9a9590; --text-muted: #5a5550;
            --font-head: 'Oswald', sans-serif; --font-body: 'Montserrat', sans-serif;
            --nav-h: 64px; --sidebar-w: 240px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: var(--dark); color: var(--text); font-family: var(--font-body); font-size: 14px; min-height: 100vh; -webkit-font-smoothing: antialiased; }

        .v-tag { position: fixed; bottom: 10px; right: 10px; font-family: monospace; font-size: 10px; color: var(--gold); z-index: 9999; opacity: 0.5; background: #000; padding: 4px; border: 1px solid var(--border); }

        #login-ui { position: fixed; inset: 0; background: var(--dark); z-index: 8000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 340px; text-align: center; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-dark { background: #111; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; }
        .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 10px; cursor: pointer; font-weight: bold; background: none; border: none; z-index: 5; }
        .btn-login { background: var(--red); color: white; padding: 14px; border-radius: 10px; border: none; font-family: var(--font-head); font-weight: 600; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--red); color: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--gold); z-index: 9000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 600; font-family: var(--font-head); }
        #custom-alert.show { transform: translateX(-50%) translateY(0); }

        .app { display: none; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); background: var(--dark2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
        .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
        
        .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
        .logo-flame { width: 36px; height: 36px; background: var(--red); border-radius: 8px; position: relative; margin-right: 10px; display: inline-block; vertical-align: middle;}
        .logo-flame::before { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 22px solid var(--gold); filter: drop-shadow(0 0 4px rgba(255,207,0,0.6)); }
        
        .sidebar-student { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .student-avatar { width: 40px; height: 40px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--gold); border: 2px solid var(--red-light); margin-bottom: 10px;}

        .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: var(--text-dim); cursor: pointer; transition: 0.15s; font-size: 13px; font-weight: 500; border: none; background: none; width: 100%; text-align: left; }
        .nav-item.active { color: var(--gold); background: rgba(136,11,24,0.25); position: relative; }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); }

        .topbar { height: var(--nav-h); background: var(--dark2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
        .page-content { padding: 28px 24px; flex: 1; }
        .page { display: none; }
        .page.active { display: block; }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .option-label { display: block; background: var(--dark3); padding: 12px; border-radius: 8px; margin-top: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .option-label:hover { background: var(--dark4); border-color: var(--gold-dim); }
        .option-label input { margin-right: 10px; accent-color: var(--gold); }
    </style>
</head>
<body>

    <div class="v-tag">DRAGON_VER_1.3.15</div>
    <div id="custom-alert">ALERT</div>

    <div id="login-ui">
        <div class="login-card">
            <div class="logo-flame"></div>
            <h2 style="font-family: var(--font-head); margin-bottom: 20px;">FLAMING DRAGON</h2>
            <div class="input-group">
                <input type="email" id="email" class="input-dark" placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="pass" class="input-dark" placeholder="Password">
                <button type="button" class="toggle-btn" onclick="localToggle(event)">SHOW</button>
            </div>
            <button class="btn-login" id="login-btn" onclick="localLogin()">Access Portal</button>
        </div>
    </div>

    <div class="app" id="app-portal">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-flame"></div>
                <span style="font-family:var(--font-head); font-weight:700; letter-spacing:1px;">FLAMING DRAGON</span>
            </div>
            <div class="sidebar-student">
                <div class="student-avatar" id="stu-initials">?</div>
                <div class="student-name" id="stu-name">CANDIDATE</div>
                <div id="stu-email" style="font-size:10px; color:var(--gold); margin-top:4px;">email@example.com</div>
            </div>
            <nav style="flex:1; padding-top:12px;">
                <button class="nav-item active" onclick="switchTab('dashboard', this)">Dashboard</button>
                <button class="nav-item" onclick="switchTab('exams', this)">Exams</button>
                <button class="nav-item" onclick="switchTab('results', this)">My Results</button>
                <button class="nav-item" style="margin-top:auto; color:var(--red);" onclick="location.reload()">Logout</button>
            </nav>
        </aside>

        <div class="main">
            <header class="topbar">
                <div style="flex:1">
                    <div style="font-family:var(--font-head); font-size:18px; font-weight:600;" id="page-title">DASHBOARD</div>
                    <div style="font-size:12px; color:var(--text-muted);" id="page-sub">Welcome back</div>
                </div>
            </header>
            <div class="page-content">
                <div id="tab-dashboard" class="page active">
                    <div class="card"><h3>Portal Status: Ready</h3><p>Select 'Exams' to start your test session.</p></div>
                </div>
                <div id="tab-exams" class="page">
                    <div id="unlock-zone">
                        <div class="card">
                            <h2>EXAM KEY</h2>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <input type="text" id="exam-key-input" class="input-dark" style="width:250px" placeholder="e.g. Quiz_1_Test">
                                <button class="btn-login" style="width:120px" onclick="handleExamUnlock()">Unlock</button>
                            </div>
                        </div>
                    </div>
                    <div id="quiz-area"></div>
                </div>
                <div id="tab-results" class="page">
                    <div id="results-list" class="card">
                        <h2>MY RESULTS</h2>
                        <p style="color:var(--text-dim);">No exam records found.</p>
                    </div>
                </div>
                <div id="tab-review" class="page">
                    <div id="review-area"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co";
    const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
    let client = null;
    let activeQuestions = [];
    let timerInterval;
    let currentUser = null;
    let activeExamKey = "";
    let activeConfigId = ""; 

    function getClient() {
        if (!client) client = window.supabase.createClient(SB_URL, SB_KEY);
        return client;
    }

    function showAlert(msg) {
        const a = document.getElementById('custom-alert');
        a.innerText = msg; a.classList.add('show');
        setTimeout(() => a.classList.remove('show'), 3000);
    }

    function localToggle(e) {
        if(e) e.preventDefault();
        const p = document.getElementById('pass');
        const btn = e.target;
        p.type = p.type === 'password' ? 'text' : 'password';
        btn.innerText = p.type === 'password' ? 'SHOW' : 'HIDE';
    }

    async function localLogin() {
        const btn = document.getElementById('login-btn');
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(!e || !p) return showAlert("FILL ALL FIELDS");
        btn.innerText = "VERIFYING..."; btn.disabled = true;
        try {
            const { data, error } = await getClient().from('users').select('*').eq('email', e).eq('password', p).limit(1);
            if (data && data.length > 0) {
                currentUser = data[0];
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('app-portal').style.display = 'flex';
                document.getElementById('stu-name').innerText = currentUser.full_name;
                document.getElementById('stu-email').innerText = currentUser.email;
                document.getElementById('stu-initials').innerText = currentUser.full_name.charAt(0).toUpperCase();
            } else {
                showAlert("ACCESS DENIED");
                btn.innerText = "ACCESS PORTAL"; btn.disabled = false;
            }
        } catch (err) { showAlert("DB ERROR"); btn.disabled = false; btn.innerText = "ACCESS PORTAL"; }
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        const targetPage = document.getElementById('tab-' + id);
        if(targetPage) targetPage.classList.add('active');
        
        if(el) el.classList.add('active');
        document.getElementById('page-title').innerText = id.toUpperCase();
        
        // Cleanup Subtitle if not in exam/review
        if(id !== 'exams' && id !== 'review') {
            document.getElementById('page-sub').innerText = "Welcome back";
            document.getElementById('page-sub').style.color = "var(--text-muted)";
        }

        if(id === 'results') loadResults();
    }

    async function loadResults() {
        const list = document.getElementById('results-list');
        list.innerHTML = '<h2 style="font-family:var(--font-head); color:var(--gold); margin-bottom:15px;">MY RESULTS</h2><p style="color:var(--text-dim);">Loading records...</p>';

        try {
            const { data, error } = await getClient()
                .from('results')
                .select('*')
                .eq('student_email', currentUser.email)
                .order('id', { ascending: false });

            if (error) throw error;

            let html = '<h2 style="font-family:var(--font-head); color:var(--gold); margin-bottom:15px;">MY RESULTS</h2>';
            if (!data || data.length === 0) {
                html += '<p style="color:var(--text-dim);">No exam records found.</p>';
            } else {
                html += `
                <table style="width:100%; border-collapse:collapse; margin-top:15px; text-align:left;">
                    <thead>
                        <tr style="border-bottom:1px solid var(--border); color:var(--gold);">
                            <th style="padding:12px 8px;">Exam</th>
                            <th style="padding:12px 8px;">Score</th>
                            <th style="padding:12px 8px;">%</th>
                            <th style="padding:12px 8px;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(r => `
                            <tr style="border-bottom:1px solid var(--border);">
                                <td style="padding:12px 8px;">${r.exam_title}<br><small style="color:var(--text-muted)">${r.key_used}</small></td>
                                <td style="padding:12px 8px;">${r.score} / ${r.total}</td>
                                <td style="padding:12px 8px; font-weight:bold; color:${r.percentage >= 70 ? '#4caf50' : 'var(--red-light)'}">${r.percentage}%</td>
                                <td style="padding:12px 8px;">
                                    <button class="btn-login" style="padding:5px 10px; font-size:10px; width:auto;" onclick="viewExamDetails('${r.key_used}', ${JSON.stringify(r.answers).replace(/"/g, '&quot;')})">REVIEW</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
            }
            list.innerHTML = html;
        } catch (err) {
            list.innerHTML = '<h2 style="font-family:var(--font-head); color:var(--gold); margin-bottom:15px;">MY RESULTS</h2><p style="color:var(--red);">Error loading records.</p>';
        }
    }

    async function viewExamDetails(key, savedAnswers) {
        const area = document.getElementById('review-area');
        area.innerHTML = '<div class="card"><p>Fetching review data...</p></div>';
        switchTab('review');
        document.getElementById('page-title').innerText = "EXAM REVIEW";

        try {
            const db = getClient();
            const { data: exam } = await db.from('exams').select('question_ids, title').eq('exam_key', key).single();
            const { data: qs } = await db.from('questions').select('*').in('id', exam.question_ids);

            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="color:var(--gold); font-family:var(--font-head); text-transform:uppercase;">${exam.title}</h2>
                    <button class="btn-login" style="width:auto; padding:8px 15px;" onclick="switchTab('results')">BACK</button>
                </div>
            `;
            
            const orderedQs = exam.question_ids.map(id => qs.find(q => q.id === id));

            orderedQs.forEach((q, i) => {
                if(!q) return;
                const studentChoice = savedAnswers[q.id];
                const isCorrect = studentChoice === q.correct_choice;

                html += `
                <div class="card" style="border-left: 5px solid ${isCorrect ? '#4caf50' : 'var(--red)'}">
                    <p style="margin-bottom:12px;"><b>${i+1}. ${q.question_text}</b></p>
                    <div style="font-size:13px; line-height:1.8;">
                        <p style="${q.correct_choice === 'A' ? 'color:#4caf50; font-weight:700;' : ''} ${studentChoice === 'A' && !isCorrect ? 'color:var(--red-light); text-decoration:line-through;' : ''}">
                            A. ${q.choice_a} ${q.correct_choice === 'A' ? '✔️' : ''} ${studentChoice === 'A' ? ' <b style="color:var(--gold)">(YOU)</b>' : ''}
                        </p>
                        <p style="${q.correct_choice === 'B' ? 'color:#4caf50; font-weight:700;' : ''} ${studentChoice === 'B' && !isCorrect ? 'color:var(--red-light); text-decoration:line-through;' : ''}">
                            B. ${q.choice_b} ${q.correct_choice === 'B' ? '✔️' : ''} ${studentChoice === 'B' ? ' <b style="color:var(--gold)">(YOU)</b>' : ''}
                        </p>
                        <p style="${q.correct_choice === 'C' ? 'color:#4caf50; font-weight:700;' : ''} ${studentChoice === 'C' && !isCorrect ? 'color:var(--red-light); text-decoration:line-through;' : ''}">
                            C. ${q.choice_c} ${q.correct_choice === 'C' ? '✔️' : ''} ${studentChoice === 'C' ? ' <b style="color:var(--gold)">(YOU)</b>' : ''}
                        </p>
                        <p style="${q.correct_choice === 'D' ? 'color:#4caf50; font-weight:700;' : ''} ${studentChoice === 'D' && !isCorrect ? 'color:var(--red-light); text-decoration:line-through;' : ''}">
                            D. ${q.choice_d} ${q.correct_choice === 'D' ? '✔️' : ''} ${studentChoice === 'D' ? ' <b style="color:var(--gold)">(YOU)</b>' : ''}
                        </p>
                    </div>
                </div>`;
            });

            area.innerHTML = html + `<button class="btn-login" style="margin-top:10px;" onclick="switchTab('results')">BACK TO RESULTS</button>`;
            document.getElementById('page-sub').innerText = `Attempt Review for ${key}`;
            
        } catch (err) {
            console.error(err);
            showAlert("REVIEW LOAD FAILED");
        }
    }

    function shuffleChoices(q) {
        let choices = [
            { label: 'A', text: q.choice_a }, { label: 'B', text: q.choice_b },
            { label: 'C', text: q.choice_c }, { label: 'D', text: q.choice_d }
        ];
        return choices.sort(() => Math.random() - 0.5);
    }

    async function autoSave(qid, choice) {
        if(!currentUser) return;
        const timeText = document.getElementById('page-sub').innerText;
        const timeMatch = timeText.match(/\d+/g);
        let timeLeft = 0;
        if(timeMatch && timeMatch.length >= 2) {
            timeLeft = (parseInt(timeMatch[0]) * 60) + parseInt(timeMatch[1]);
        }
        try {
            await getClient().from('exam_attempts').upsert({
                student_email: currentUser.email,
                exam_key: activeExamKey,
                question_id: qid,
                selected_choice: choice,
                remaining_time: timeLeft
            }, { onConflict: 'student_email,exam_key,question_id' });
        } catch (e) { console.error("Auto-save fail", e); }
    }

   async function handleExamUnlock() {
    const key = document.getElementById('exam-key-input').value.trim();
    if(!key) return showAlert("ENTER KEY");
    try {
        const db = getClient();
        const { data: exam, error: examError } = await db.from('exams').select('*').eq('exam_key', key).single();
        if (examError) return showAlert("KEY NOT FOUND");
        
        activeExamKey = key;
        activeConfigId = exam.config_id; 
        
        const { data: config } = await db.from('exam_config').select('*').eq('config_id', exam.config_id).single();
        
        // 1. Fetch questions based on the exam's array
        const { data: qs } = await db.from('questions').select('*').in('id', exam.question_ids);
        
        // 2. CRITICAL: Re-sort questions to match the exact order in exam.question_ids
        activeQuestions = exam.question_ids.map(id => qs.find(q => q.id === id)).filter(q => q !== undefined);
        
        startExamSession(exam.title, config.timer_minutes);
    } catch (err) { alert("LOAD ERROR: " + err.message); }
}

    function startExamSession(title, mins) {
        document.getElementById('unlock-zone').style.display = 'none';
        let time = (mins || 60) * 60;
        const sub = document.getElementById('page-sub');
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            sub.innerText = `TIME REMAINING: ${m}:${s < 10 ? '0' : ''}${s}`;
            sub.style.color = time < 60 ? 'var(--red)' : 'var(--gold)';
            if(time <= 0) { submitQuiz(); }
            time--;
        }, 1000);

        const area = document.getElementById('quiz-area');
        let html = `<h2 id="active-exam-title" style="margin-bottom:20px; color:var(--gold); font-family:var(--font-head); text-transform: uppercase;">${title}</h2>`;
        activeQuestions.forEach((q, i) => {
            const shuffled = shuffleChoices(q);
            html += `<div class="card"><p style="margin-bottom: 15px;"><b>${i+1}. ${q.question_text}</b></p>
                ${shuffled.map(c => `<label class="option-label"><input type="radio" name="${q.id}" value="${c.label}" onclick="autoSave('${q.id}', '${c.label}')">${c.text}</label>`).join('')}</div>`;
        });
        area.innerHTML = html + `<button id="submit-btn" class="btn-login" style="margin-top:20px;" onclick="submitQuiz()">FINISH & SUBMIT</button>`;
    }

    async function submitQuiz() {
        const btn = document.getElementById('submit-btn');
        if(btn) { btn.innerText = "RECORDING..."; btn.disabled = true; }
        clearInterval(timerInterval);
        const title = document.getElementById('active-exam-title')?.innerText || "Untitled Exam";
        let correct = 0;
        let studentAnswers = {};
        activeQuestions.forEach(q => {
            const sel = document.querySelector(`input[name="${q.id}"]:checked`);
            const val = sel ? sel.value : null;
            studentAnswers[q.id] = val;
            if (val === q.correct_choice) correct++;
        });
        const percent = ((correct / activeQuestions.length) * 100).toFixed(0);
        try {
            const { error } = await getClient().from('results').insert([{
                student_email: currentUser.email,
                student_name: currentUser.full_name,
                key_used: activeExamKey,
                config_id: activeConfigId, 
                exam_title: title,
                score: parseInt(correct),
                total: parseInt(activeQuestions.length),
                percentage: parseInt(percent),
                answers: studentAnswers 
            }]);
            if(error) throw error;
            showAlert(`SUCCESS! Result saved.`);
            document.getElementById('quiz-area').innerHTML = "";
            document.getElementById('unlock-zone').style.display = 'block';
            document.getElementById('page-sub').innerText = "Welcome back";
            document.getElementById('page-sub').style.color = "var(--text-muted)";
            switchTab('dashboard', document.querySelector('.nav-item'));
        } catch (err) { 
            console.error("Result save error:", err);
            alert("Save Error: " + err.message); 
            if(btn) { btn.innerText = "FINISH & SUBMIT"; btn.disabled = false; }
        }
    }
</script>
</body>
</html>
