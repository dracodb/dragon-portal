<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flaming Dragon — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --red: #880b18; --gold: #ffcf00; --dark: #0f0f0f; --surface: #1e1e1e;
            --border: rgba(255,255,255,0.08); --text: #f0ede8; --text-dim: #9a9590;
            --font-head: 'Oswald', sans-serif; --font-body: 'Montserrat', sans-serif;
        }
        body { background: var(--dark); color: var(--text); font-family: var(--font-body); margin: 0; overflow-x: hidden; }
        
        /* Version Tag */
        .version-tag { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: var(--text-dim); opacity: 0.5; z-index: 3000; font-family: monospace; }

        /* Login Overlay */
        .login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 320px; text-align: center; }
        
        /* Layout */
        .app-container { display: none; min-height: 100vh; flex-direction: row; width: 100%; }
        .sidebar { width: 240px; background: #111; border-right: 1px solid var(--border); padding: 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; cursor: pointer; color: var(--text-dim); transition: 0.2s; border-radius: 8px; margin-bottom: 5px; }
        .nav-item.active { background: rgba(136,11,24,0.2); color: var(--gold); border-left: 3px solid var(--gold); }
        
        /* Elements */
        .main-content { flex: 1; padding: 40px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .btn { background: var(--red); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-family: var(--font-head); cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-dark { background: #111; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        
        .page { display: none; }
        .page.active { display: block; }

        .logo-flame { width: 40px; height: 40px; background: var(--red); border-radius: 8px; margin: 0 auto 10px; position: relative; }
        .logo-flame::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 15px solid var(--gold); }
    </style>
</head>
<body>

    <div class="version-tag">PORTAL_VER_1.0.2</div>

    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="logo-flame"></div>
            <h2 style="font-family: var(--font-head); margin: 0;">FLAMING DRAGON</h2>
            <p style="font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 25px;">STUDENT PORTAL</p>
            
            <input type="email" id="student-email" class="input-dark" placeholder="Email Address">
            <input type="password" id="student-password" class="input-dark" placeholder="Password">
            
            <button id="login-btn" class="btn" onclick="portalLogin()">ACCESS PORTAL</button>
        </div>
    </div>

    <div id="app" class="app-container">
        <aside class="sidebar">
            <h3 style="font-family: var(--font-head); color: var(--text);">FLAMING DRAGON</h3>
            <p id="user-display" style="font-size: 12px; color: var(--gold); margin-bottom: 30px;"></p>
            
            <div class="nav-item active" id="nav-dash" onclick="switchPage('dashboard', this)">Dashboard</div>
            <div class="nav-item" id="nav-exams" onclick="switchPage('exams', this)">Take Exam</div>
            <div class="nav-item" id="nav-results" onclick="switchPage('results', this)">My Results</div>
            
            <div style="margin-top: 50px;">
                <button class="btn" style="background: transparent; border: 1px solid var(--border); font-size: 12px;" onclick="location.reload()">LOGOUT</button>
            </div>
        </aside>

        <main class="main-content">
            <div id="page-dashboard" class="page active">
                <h1 style="font-family: var(--font-head);">DASHBOARD</h1>
                <div class="card">
                    <h2 id="welcome-header">Welcome, Dragon!</h2>
                    <p style="color: var(--text-dim);">Portal Version 1.0.2 Active.</p>
                </div>
            </div>

            <div id="page-exams" class="page">
                <h1 style="font-family: var(--font-head);">EXAM VAULT</h1>
                <div id="exam-unlock-ui" class="card" style="max-width: 400px;">
                    <p style="margin-bottom: 15px;">Enter your <strong>Dragon Key</strong> to start.</p>
                    <input type="text" id="dragon-key-input" class="input-dark" placeholder="e.g. DRACO-2026">
                    <button class="btn" onclick="unlockExam()">START GAUNTLET</button>
                </div>
                <div id="exam-engine" style="display:none;">
                    <div class="card">
                        <h2 id="q-text">Loading...</h2>
                        <div id="choices" style="display: grid; gap: 10px; margin-top:20px;"></div>
                    </div>
                </div>
            </div>

            <div id="page-results" class="page">
                <h1 style="font-family: var(--font-head);">RESULTS</h1>
                <div class="card"><p>Performance data loading...</p></div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co";
        const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
        
        let supabase;

        // PRE-FLIGHT: Ensure Supabase is ready
        window.onload = () => {
            if (typeof window.supabase === 'undefined') {
                alert("Supabase not loaded. Please refresh or check connection.");
            } else {
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                console.log("Dragon System Online.");
            }
        };

        let currentUser = null;

        async function portalLogin() {
            const email = document.getElementById('student-email').value.trim();
            const password = document.getElementById('student-password').value.trim();
            const btn = document.getElementById('login-btn');

            if(!email || !password) return alert("Fields cannot be empty.");

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    alert("Invalid email or password.");
                    btn.innerText = "ACCESS PORTAL";
                    btn.disabled = false;
                    return;
                }

                currentUser = data;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('user-display').innerText = data.email;
            } catch (err) {
                alert("Critical System Error. Check console.");
                console.error(err);
                btn.disabled = false;
            }
        }

        async function unlockExam() {
            const key = document.getElementById('dragon-key-input').value.trim();
            const { data, error } = await supabase.from('exam_keys').select('*').eq('key_code', key).single();
            if(error || !data) return alert("Key invalid.");
            alert("Exam Unlocked! Questions loading...");
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
