<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DracoDav Portal | The Gauntlet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dragon-gradient { background: linear-gradient(135deg, #ef4444 0%, #7c3aed 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-4 border-b border-slate-800 flex justify-between items-center glass sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 dragon-gradient rounded-lg flex items-center justify-center font-bold">D</div>
            <h1 class="font-bold tracking-tight">DRACO<span class="text-red-500">PORTAL</span></h1>
        </div>
    </header>

    <main id="app-container" class="flex-grow flex items-center justify-center p-4">
        <div id="login-screen" class="max-w-md w-full glass p-8 rounded-2xl shadow-2xl">
            <h2 class="text-2xl font-bold mb-2">Welcome, Dragon 🐉</h2>
            <p class="text-slate-400 mb-6 text-sm">Enter your credentials to begin.</p>
            <div class="space-y-4">
                <input type="email" id="student-email" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg outline-none" placeholder="Email Address">
                <input type="text" id="dragon-key" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg outline-none" placeholder="Dragon Key (e.g. DRACO-2026)">
                <button onclick="validateEntry()" class="w-full dragon-gradient p-3 rounded-lg font-bold">ENTER THE PORTAL</button>
            </div>
        </div>

        <div id="exam-screen" class="hidden w-full max-w-4xl space-y-6">
            <div class="flex justify-between items-end">
                <h2 id="config-title" class="text-2xl font-bold italic">Loading...</h2>
                <span id="progress-text" class="text-sm text-slate-400 font-mono"></span>
            </div>
            <div class="glass p-8 rounded-3xl min-h-[300px]">
                <h3 id="question-text" class="text-xl md:text-2xl mb-8"></h3>
                <div id="choices-container" class="grid gap-4"></div>
            </div>
            <div class="flex justify-between">
                <button onclick="prevQuestion()" class="px-6 py-3 border border-slate-700 rounded-xl">Previous</button>
                <button id="next-btn" onclick="nextQuestion()" class="px-8 py-3 dragon-gradient font-bold rounded-xl">Next Question</button>
            </div>
        </div>
    </main>

    <script>
        // --- YOUR LIVE CONNECTION ---
        const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co"; 
        const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let currentQuestions = [];
        let currentIndex = 0;
        let answers = {};
        let currentConfig = null;

        async function validateEntry() {
            const email = document.getElementById('student-email').value;
            const key = document.getElementById('dragon-key').value;
            if(!email || !key) return alert("Fill all fields");

            const { data, error } = await supabase.from('exam_keys').select('*, exam_configs(*)').eq('key_code', key).single();
            if(error || !data) return alert("Key not found! Make sure you created DRACO-2026 in your DB.");
            
            currentConfig = data.exam_configs;
            loadExam();
        }

        async function loadExam() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            document.getElementById('config-title').innerText = currentConfig.title;

            const { data: questions } = await supabase.from('questions').select('*').limit(currentConfig.total_questions);
            if(!questions || questions.length === 0) return alert("No questions found in database. Please add one in Supabase Table Editor.");
            
            currentQuestions = questions;
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-text').innerText = q.question_text;
            document.getElementById('progress-text').innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
            const container = document.getElementById('choices-container');
            container.innerHTML = '';

            ['a', 'b', 'c', 'd'].forEach(letter => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-4 rounded-xl border border-slate-700 hover:border-red-500 flex gap-4 ${answers[currentIndex] === letter ? 'border-red-500 bg-red-500/10' : ''}`;
                btn.innerHTML = `<span class="font-bold uppercase">${letter}.</span> <span>${q['choice_'+letter]}</span>`;
                btn.onclick = () => { answers[currentIndex] = letter; renderQuestion(); };
                container.appendChild(btn);
            });
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) { currentIndex++; renderQuestion(); } 
            else { alert("Mock Exam Finished! Logic to save results is next."); }
        }

        function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }
    </script>
</body>
</html>
