<script>
    const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co";
    const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
    
    async function portalLogin() {
        console.log("LOGIN TRIGGERED");
        
        // 1. Force the button to change immediately (No waiting for Supabase)
        const btn = document.getElementById('login-btn');
        btn.innerText = "CONNECTING...";
        btn.style.background = "orange"; // Visual proof the code is running

        const email = document.getElementById('student-email').value.trim();
        const password = document.getElementById('student-password').value.trim();

        if (!email || !password) {
            alert("Please fill in both fields.");
            btn.innerText = "ACCESS PORTAL";
            btn.style.background = "";
            return;
        }

        try {
            // 2. Initialize Supabase inside the function to prevent "silent freeze"
            const supabase = window.supabase.createClient(SB_URL, SB_KEY);
            
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('email', email)
                .eq('password', password)
                .single();

            if (error) {
                console.error("DB Error:", error);
                alert("Database says: " + error.message);
                btn.innerText = "ACCESS PORTAL";
                btn.style.background = "";
                return;
            }

            if (data) {
                alert("Welcome, " + data.email);
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('user-display').innerText = data.email;
            } else {
                alert("No user found with these credentials.");
                btn.innerText = "ACCESS PORTAL";
                btn.style.background = "";
            }
        } catch (err) {
            console.error("CRASH:", err);
            alert("System Crash: Check your Console (F12)");
            btn.innerText = "ACCESS PORTAL";
            btn.style.background = "";
        }
    }
</script>
