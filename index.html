<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flaming Dragon — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- KEEPING YOUR CSS VARIABLES --- */
        :root {
            --red: #880b18; --red-dark: #5c0710; --red-light: #a81020;
            --gold: #ffcf00; --gold-dim: #c9a200;
            --dark: #0f0f0f; --dark2: #181818; --dark3: #222222; --dark4: #2a2a2a;
            --surface: #1e1e1e; --border: rgba(255,255,255,0.08);
            --text: #f0ede8; --text-dim: #9a9590; --text-muted: #5a5550;
            --font-head: 'Oswald', sans-serif; --font-body: 'Montserrat', sans-serif;
            --nav-h: 64px; --sidebar-w: 240px;
        }

        /* [REST OF YOUR CSS STYLES HERE - I am keeping them all] */
        /* Adding a specific style for the Login Overlay */
        #login-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: var(--dark); display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 40px; border-radius: 20px; width: 100%; max-width: 400px;
        }
        input {
            width: 100%; background: var(--dark); border: 1px solid var(--border);
            padding: 12px; border-radius: 8px; color: white; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--gold); }
        
        /* Including your layout classes */
        /* ... (The rest of your CSS as provided above) ... */
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="logo-flame" style="margin: 0 auto 15px;"></div>
            <h1 style="font-family: var(--font-head); letter-spacing: 2px;">FLAMING DRAGON</h1>
            <p style="font-size: 12px; color: var(--text-dim);">AUTHORIZED STUDENT ACCESS ONLY</p>
        </div>
        <input type="email" id="student-email" placeholder="Email Address">
        <input type="text" id="dragon-key" placeholder="Dragon Access Key">
        <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="validatePortalEntry()">UNLOCK PORTAL</button>
    </div>
</div>

<div class="app" id="main-app" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-flame"></div>
        <div class="logo-text">
          <div class="top">Flaming Dragon</div>
          <div class="bottom">Student Portal</div>
        </div>
      </div>
    </div>

    <div class="sidebar-student">
      <div class="student-avatar" id="avatar-initials">--</div>
      <div class="student-name" id="display-name">Loading...</div>
      <div class="student-batch" id="display-batch">Validating...</div>
      <div class="student-key" id="display-key">KEY-XXXX</div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="navigate('dashboard', this)">Dashboard</button>
      <button class="nav-item" onclick="navigate('videos', this)">Video Library</button>
      <button class="nav-item" onclick="navigate('exams', this)">Mock Exams</button>
      <button class="nav-item" onclick="navigate('results', this)">My Results</button>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="page-title" id="pageTitle">Dashboard</div>
    </header>

    <div class="page-content">
        <div id="page-dashboard" class="page active">
            <div class="welcome-banner">
                <div class="welcome-text">
                    <div class="greeting">Welcome back</div>
                    <div class="name" id="hero-name">Dragon Student</div>
                </div>
            </div>
            </div>
    </div>
  </div>
</div>

<script>
    // --- LIVE DATABASE CONNECTION ---
    const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co"; 
    const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    async function validatePortalEntry() {
        const email = document.getElementById('student-email').value;
        const key = document.getElementById('dragon-key').value;

        // Fetch Key and associated Student/Batch info
        const { data, error } = await supabase
            .from('exam_keys')
            .select('*, exam_configs(*)')
            .eq('key_code', key)
            .single();

        if(error || !data) {
            alert("Invalid Dragon Key. Please contact admin.");
            return;
        }

        // Logic to transition UI
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        
        // Update Student Info in Sidebar
        document.getElementById('display-name').innerText = email.split('@')[0].toUpperCase();
        document.getElementById('hero-name').innerText = email.split('@')[0];
        document.getElementById('display-key').innerText = key;
        document.getElementById('avatar-initials').innerText = email.charAt(0).toUpperCase();
    }

    function navigate(page, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        if (btn) btn.classList.add('active');
    }
</script>
</body>
</html>
