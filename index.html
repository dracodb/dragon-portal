<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flaming Dragon — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --red: #880b18; --gold: #ffcf00; --dark: #0f0f0f; --surface: #1e1e1e;
            --border: rgba(255,255,255,0.08); --text: #f0ede8; --text-dim: #9a9590;
            --font-head: 'Oswald', sans-serif; --font-body: 'Montserrat', sans-serif;
        }
        body { background: var(--dark); color: var(--text); font-family: var(--font-body); margin: 0; overflow: hidden; height: 100vh; }
        
        /* Debug Tag */
        .v-tag { position: fixed; bottom: 10px; right: 10px; font-family: monospace; font-size: 10px; color: var(--gold); z-index: 9999; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }

        /* Login UI */
        .login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 340px; text-align: center; }
        .logo-flame { width: 45px; height: 45px; background: var(--red); border-radius: 10px; margin: 0 auto 15px; position: relative; }
        .logo-flame::after { content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid var(--gold); }
        
        .input-group { position: relative; margin-bottom: 15px; width: 100%; }
        .input-dark { background: #111; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; font-size: 14px; }
        .input-dark:focus { border-color: var(--gold); }
        
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gold); font-size: 10px; font-weight: bold; z-index: 100; padding: 10px; background: #111; }

        .btn { background: var(--red); color: white; border: none; padding: 14px; border-radius: 10px; font-family: var(--font-head); cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #a31220; }

        /* Main App (Hidden by default) */
        .app-container { display: none; min-height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div class="v-tag">DRAGON_VER_1.1.0</div>

    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="logo-flame"></div>
            <h2 style="font-family: var(--font-head); margin: 0;">FLAMING DRAGON</h2>
            <p style="font-size: 10px; color: var(--gold); letter-spacing: 3px; margin-bottom: 30px;">STUDENT LOGIN</p>
            
            <div class="input-group">
                <input type="email" id="email" class="input-dark" placeholder="Email Address">
            </div>
            
            <div class="input-group">
                <input type="password" id="pass" class="input-dark" placeholder="Password">
                <div class="toggle-pass" onclick="togglePassword()">SHOW</div>
            </div>
            
            <button id="login-btn" class="btn" onclick="portalLogin()">ACCESS PORTAL</button>
        </div>
    </div>

    <div id="app" class="app-container">
        <div style="padding: 50px; text-align: center;">
            <h1 style="font-family: var(--font-head);">DRAGON VAULT UNLOCKED</h1>
            <p id="user-display"></p>
            <button onclick="location.reload()" class="btn" style="width: 200px; background: transparent; border: 1px solid var(--border);">LOGOUT</button>
        </div>
    </div>

    <script>
        // 1. Safety Check: Initialize Supabase globally but wrapped in a try/catch
        const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co";
        const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
        let supabase;

        try {
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
            console.log("Supabase connected.");
        } catch (e) {
            console.error("Supabase fail:", e);
        }

        // 2. Toggle Password (Self-contained, no DB needed)
        function togglePassword() {
            console.log("Toggle clicked");
            const passField = document.getElementById('pass');
            const toggleDiv = document.querySelector('.toggle-pass');
            
            if (passField.type === "password") {
                passField.type = "text";
                toggleDiv.innerText = "HIDE";
            } else {
                passField.type = "password";
                toggleDiv.innerText = "SHOW";
            }
        }

        // 3. Login Function
        async function portalLogin() {
            console.log("Login clicked");
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pass').value.trim();

            if (!email || !password) {
                alert("Please fill in all fields.");
                return;
            }

            if (!supabase) {
                alert("Critical Error: Database connection failed. Refresh the page.");
                return;
            }

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password)
                    .limit(1);

                if (error) {
                    alert("Database Error: " + error.message);
                    btn.innerText = "ACCESS PORTAL";
                    btn.disabled = false;
                } else if (data && data.length > 0) {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    document.getElementById('user-display').innerText = "Dragon: " + data[0].email;
                } else {
                    alert("No account found. Check your credentials.");
                    btn.innerText = "ACCESS PORTAL";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("System Crash. Check Console.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
