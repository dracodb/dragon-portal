<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flaming Dragon — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --red: #880b18; --red-dark: #5c0710; --red-light: #a81020;
            --gold: #ffcf00; --gold-dim: #c9a200; --dark: #0f0f0f;
            --dark2: #181818; --dark3: #222222; --dark4: #2a2a2a;
            --surface: #1e1e1e; --border: rgba(255,255,255,0.12);
            --text: #f0ede8; --text-dim: #9a9590; --text-muted: #6a6560;
            --font-head: 'Oswald', sans-serif; --font-body: 'Montserrat', sans-serif;
            --nav-h: 70px; --sidebar-w: 260px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: var(--dark); color: var(--text); font-family: var(--font-body); font-size: 16px; min-height: 100vh; -webkit-font-smoothing: antialiased; }

        /* ── MOBILE READABILITY ── */
        h2 { font-size: 1.8rem; }
        p { line-height: 1.6; }

        .v-tag { position: fixed; bottom: 10px; right: 10px; font-family: monospace; font-size: 10px; color: var(--gold); z-index: 9999; opacity: 0.5; background: #000; padding: 4px; border: 1px solid var(--border); }

        #login-ui { position: fixed; inset: 0; background: var(--dark); z-index: 8000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--surface); padding: 40px 25px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 380px; text-align: center; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-dark { background: #111; border: 1px solid var(--border); color: white; padding: 16px; border-radius: 12px; width: 100%; box-sizing: border-box; outline: none; font-size: 16px; }
        .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 12px; cursor: pointer; font-weight: bold; background: none; border: none; z-index: 5; }
        
        .btn-login { background: var(--red); color: white; padding: 18px; border-radius: 12px; border: none; font-family: var(--font-head); font-size: 18px; font-weight: 600; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--red); color: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--gold); z-index: 9000; transition: 0.4s; font-weight: 600; font-family: var(--font-head); width: 90%; text-align: center; }
        #custom-alert.show { transform: translateX(-50%) translateY(0); }

        /* ── APP LAYOUT ── */
        .app { display: none; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); background: var(--dark2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; transition: transform 0.3s ease; }
        
        /* HIDE SIDEBAR DURING EXAM */
        body.in-exam .sidebar { transform: translateX(-100%); }
        body.in-exam .main { margin-left: 0; }

        .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; transition: margin 0.3s ease; }
        
        .sidebar-logo { padding: 30px 20px; border-bottom: 1px solid var(--border); }
        .logo-flame { width: 40px; height: 40px; background: var(--red); border-radius: 10px; position: relative; margin-right: 12px; display: inline-block; vertical-align: middle;}
        .logo-flame::before { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 25px solid var(--gold); }
        
        .sidebar-student { padding: 20px; border-bottom: 1px solid var(--border); }
        .student-avatar { width: 50px; height: 50px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 20px; font-weight: 700; color: var(--gold); border: 2px solid var(--red-light); margin-bottom: 12px;}

        .nav-item { display: flex; align-items: center; padding: 16px 20px; color: var(--text-dim); cursor: pointer; transition: 0.15s; font-size: 15px; font-weight: 600; border: none; background: none; width: 100%; text-align: left; }
        .nav-item.active { color: var(--gold); background: rgba(136,11,24,0.3); border-left: 4px solid var(--gold); }

        .topbar { height: var(--nav-h); background: var(--dark2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 50; }
        
        /* ── BIG TIMER STYLE ── */
        #timer-display { font-family: var(--font-head); font-size: 28px; font-weight: 700; text-align: center; width: 100%; display: none; }
        
        .page-content { padding: 20px 15px; flex: 1; max-width: 800px; margin: 0 auto; width: 100%; }
        .page { display: none; }
        .page.active { display: block; }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px 20px; margin-bottom: 20px; }
        
        /* BIG TAP TARGETS FOR OPTIONS */
        .option-label { display: flex; align-items: center; background: var(--dark3); padding: 18px; border-radius: 12px; margin-top: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; font-size: 16px; }
        .option-label:active { background: var(--dark4); border-color: var(--gold); }
        .option-label input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--gold); flex-shrink: 0; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; }
            body.menu-open .sidebar { transform: translateX(0); }
            .topbar { justify-content: space-between; }
        }
    </style>
</head>
<body class="">

    <div class="v-tag">DRAGON_VER_1.4.0</div>
    <div id="custom-alert">ALERT</div>

    <div id="login-ui">
        <div class="login-card">
            <div class="logo-flame"></div>
            <h1 style="font-family: var(--font-head); margin: 15px 0; font-size: 24px;">FLAMING DRAGON</h1>
            <div class="input-group">
                <input type="email" id="email" class="input-dark" placeholder="Email Address" inputmode="email">
            </div>
            <div class="input-group">
                <input type="password" id="pass" class="input-dark" placeholder="Password">
                <button type="button" class="toggle-btn" onclick="localToggle(event)">SHOW</button>
            </div>
            <button class="btn-login" id="login-btn" onclick="localLogin()">Access Portal</button>
        </div>
    </div>

    <div class="app" id="app-portal">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-flame"></div>
                <span style="font-family:var(--font-head); font-weight:700; letter-spacing:1px; font-size: 18px;">FLAMING DRAGON</span>
            </div>
            <div class="sidebar-student">
                <div class="student-avatar" id="stu-initials">?</div>
                <div class="student-name" id="stu-name" style="font-weight:700;">CANDIDATE</div>
                <div id="stu-email" style="font-size:12px; color:var(--gold); margin-top:4px;">email@example.com</div>
            </div>
            <nav style="flex:1; padding-top:10px;">
                <button class="nav-item active" onclick="switchTab('dashboard', this)">Dashboard</button>
                <button class="nav-item" onclick="switchTab('exams', this)">Exams</button>
                <button class="nav-item" onclick="switchTab('results', this)">My Results</button>
                <button class="nav-item" style="margin-top:auto; color:var(--red-light);" onclick="location.reload()">Logout</button>
            </nav>
        </aside>

        <div class="main">
            <header class="topbar">
                <div id="header-text" style="flex:1">
                    <div style="font-family:var(--font-head); font-size:20px; font-weight:600; text-transform:uppercase;" id="page-title">DASHBOARD</div>
                    <div style="font-size:13px; color:var(--text-muted);" id="page-sub">Welcome back</div>
                </div>
                <div id="timer-display">00:00</div>
            </header>
            
            <div class="page-content">
                <div id="tab-dashboard" class="page active">
                    <div class="card">
                        <h3 style="margin-bottom:10px; color:var(--gold);">Portal Status: Ready</h3>
                        <p>Select the <b>Exams</b> tab in the menu to begin your session.</p>
                    </div>
                </div>

                <div id="tab-exams" class="page">
                    <div id="unlock-zone">
                        <div class="card">
                            <h2 style="font-family:var(--font-head); margin-bottom:15px;">EXAM UNLOCK</h2>
                            <input type="text" id="exam-key-input" class="input-dark" style="margin-bottom:15px" placeholder="Enter Exam Key">
                            <button class="btn-login" onclick="handleExamUnlock()">Start Exam</button>
                        </div>
                    </div>
                    <div id="quiz-area"></div>
                </div>

                <div id="tab-results" class="page">
                    <div id="results-list" class="card">
                        <h2 style="font-family:var(--font-head); color:var(--gold); margin-bottom:15px;">MY RECORDS</h2>
                        <p style="color:var(--text-dim);">Loading...</p>
                    </div>
                </div>

                <div id="tab-review" class="page">
                    <div id="review-area"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const SB_URL = "https://ppznrqnfzqjxguprjvto.supabase.co";
    const SB_KEY = "sb_publishable_e3ViwxIi3qebbHQVHGzGJg_jhzwYENd";
    let client = null, activeQuestions = [], timerInterval, currentUser = null, activeExamKey = "", activeConfigId = ""; 

    function getClient() { if (!client) client = window.supabase.createClient(SB_URL, SB_KEY); return client; }
    function showAlert(msg) { const a = document.getElementById('custom-alert'); a.innerText = msg; a.classList.add('show'); setTimeout(() => a.classList.remove('show'), 3000); }
    function localToggle(e) { if(e) e.preventDefault(); const p = document.getElementById('pass'); e.target.innerText = p.type === 'password' ? 'HIDE' : 'SHOW'; p.type = p.type === 'password' ? 'text' : 'password'; }

    async function localLogin() {
        const btn = document.getElementById('login-btn');
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(!e || !p) return showAlert("FILL ALL FIELDS");
        btn.innerText = "VERIFYING..."; btn.disabled = true;
        try {
            const { data } = await getClient().from('users').select('*').eq('email', e).eq('password', p).limit(1);
            if (data?.length > 0) {
                currentUser = data[0];
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('app-portal').style.display = 'flex';
                document.getElementById('stu-name').innerText = currentUser.full_name;
                document.getElementById('stu-email').innerText = currentUser.email;
                document.getElementById('stu-initials').innerText = currentUser.full_name.charAt(0).toUpperCase();
            } else { showAlert("ACCESS DENIED"); btn.innerText = "Access Portal"; btn.disabled = false; }
        } catch (err) { showAlert("DB ERROR"); btn.disabled = false; }
    }

    function switchTab(id, el) {
        document.body.classList.remove('in-exam'); // Reset exam UI
        document.getElementById('timer-display').style.display = 'none';
        document.getElementById('header-text').style.display = 'block';
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        if(el) el.classList.add('active');
        document.getElementById('page-title').innerText = id.toUpperCase();
        if(id === 'results') loadResults();
    }

    async function loadResults() {
        const list = document.getElementById('results-list');
        try {
            const { data } = await getClient().from('results').select('*').eq('student_email', currentUser.email).order('id', { ascending: false });
            let html = '<h2 style="font-family:var(--font-head); color:var(--gold); margin-bottom:15px;">MY RECORDS</h2>';
            if (!data?.length) { html += '<p>No records found.</p>'; } 
            else {
                data.forEach(r => {
                    html += `
                    <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-weight:700;">${r.exam_title}</div>
                            <div style="font-size:12px; color:var(--text-dim);">${r.score}/${r.total} - ${r.percentage}%</div>
                        </div>
                        <button class="btn-login" style="width:auto; padding:8px 12px; font-size:12px;" onclick="viewExamDetails('${r.key_used}', ${JSON.stringify(r.answers).replace(/"/g, '&quot;')})">REVIEW</button>
                    </div>`;
                });
            }
            list.innerHTML = html;
        } catch (e) { list.innerHTML = '<p>Error loading.</p>'; }
    }

    async function handleExamUnlock() {
        const key = document.getElementById('exam-key-input').value.trim();
        try {
            const { data: exam, error } = await getClient().from('exams').select('*').eq('exam_key', key).single();
            if (error) return showAlert("KEY NOT FOUND");
            activeExamKey = key; activeConfigId = exam.config_id; 
            const { data: config } = await getClient().from('exam_config').select('*').eq('config_id', exam.config_id).single();
            const { data: qs } = await getClient().from('questions').select('*').in('id', exam.question_ids);
            activeQuestions = exam.question_ids.map(id => qs.find(q => q.id === id)).filter(q => q);
            startExamSession(exam.title, config.timer_minutes);
        } catch (err) { showAlert("LOAD ERROR"); }
    }

    function startExamSession(title, mins) {
        document.body.classList.add('in-exam');
        document.getElementById('unlock-zone').style.display = 'none';
        document.getElementById('header-text').style.display = 'none';
        const timerEl = document.getElementById('timer-display');
        timerEl.style.display = 'block';

        let time = mins * 60;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            timerEl.style.color = time < 60 ? 'var(--red-light)' : 'var(--gold)';
            if(time-- <= 0) submitQuiz();
        }, 1000);

        let html = `<h2 style="color:var(--gold); font-family:var(--font-head); margin-bottom:20px;">${title}</h2>`;
        activeQuestions.forEach((q, i) => {
            html += `<div class="card"><p style="font-size:18px; font-weight:700; margin-bottom:15px;">${i+1}. ${q.question_text}</p>
                ${['A','B','C','D'].map(l => `<label class="option-label"><input type="radio" name="${q.id}" value="${l}" onclick="autoSave('${q.id}','${l}')"> ${q['choice_'+l.toLowerCase()]}</label>`).join('')}</div>`;
        });
        document.getElementById('quiz-area').innerHTML = html + `<button id="submit-btn" class="btn-login" onclick="submitQuiz()">Submit Exam</button>`;
    }

    async function submitQuiz() {
        clearInterval(timerInterval);
        const title = document.querySelector('#quiz-area h2').innerText;
        let correct = 0, answers = {};
        activeQuestions.forEach(q => {
            const sel = document.querySelector(`input[name="${q.id}"]:checked`);
            answers[q.id] = sel ? sel.value : null;
            if (answers[q.id] === q.correct_choice) correct++;
        });
        const percent = ((correct / activeQuestions.length) * 100).toFixed(0);
        try {
            await getClient().from('results').insert([{
                student_email: currentUser.email, student_name: currentUser.full_name,
                key_used: activeExamKey, config_id: activeConfigId, 
                exam_title: title, score: correct, total: activeQuestions.length,
                percentage: percent, answers: answers 
            }]);
            showAlert("RESULTS SAVED");
            location.reload(); 
        } catch (e) { showAlert("SAVE ERROR"); }
    }

    async function viewExamDetails(key, savedAnswers) {
        const area = document.getElementById('review-area');
        switchTab('review');
        try {
            const { data: exam } = await getClient().from('exams').select('question_ids, title').eq('exam_key', key).single();
            const { data: qs } = await getClient().from('questions').select('*').in('id', exam.question_ids);
            const orderedQs = exam.question_ids.map(id => qs.find(q => q.id === id)).filter(q => q);

            let html = `<h2 style="color:var(--gold); font-family:var(--font-head); margin-bottom:20px;">REVIEW</h2>`;
            orderedQs.forEach((q, i) => {
                const choice = savedAnswers[q.id], isCorrect = choice === q.correct_choice;
                html += `<div class="card" style="border-left: 6px solid ${isCorrect ? '#4caf50' : 'var(--red)'}">
                    <p style="font-weight:700; margin-bottom:10px;">${i+1}. ${q.question_text}</p>
                    ${['A','B','C','D'].map(l => {
                        let style = q.correct_choice === l ? 'color:#4caf50; font-weight:700;' : (choice === l ? 'color:var(--red-light); text-decoration:line-through;' : 'color:var(--text-dim);');
                        return `<p style="padding:5px 0; ${style}">${l}. ${q['choice_'+l.toLowerCase()]} ${q.correct_choice === l ? '✔️' : ''} ${choice === l ? '(You)' : ''}</p>`;
                    }).join('')}
                </div>`;
            });
            area.innerHTML = html + `<button class="btn-login" onclick="switchTab('results')">Back to Records</button>`;
        } catch (e) { showAlert("REVIEW ERROR"); }
    }

    async function autoSave(qid, choice) {
        try {
            await getClient().from('exam_attempts').upsert({
                student_email: currentUser.email, exam_key: activeExamKey,
                question_id: qid, selected_choice: choice
            }, { onConflict: 'student_email,exam_key,question_id' });
        } catch (e) {}
    }
</script>
</body>
</html>
